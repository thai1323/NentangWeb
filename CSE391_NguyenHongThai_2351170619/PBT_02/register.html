<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản E-Commerce</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        fieldset { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        legend { font-weight: bold; padding: 0 10px; }
        div { margin-bottom: 10px; }
        label { display: inline-block; width: 150px; }
        input, select, textarea { padding: 5px; width: 250px; }
        input[type="radio"], input[type="checkbox"] { width: auto; }
    </style>
</head>
<body>

    <h1>Đăng ký tài khoản</h1>

    <form action="#" method="POST">
        
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <div>
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập họ tên đầy đủ">
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="example@gmail.com">
            </div>
            <div>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" pattern="\d{10}" title="Vui lòng nhập đúng 10 chữ số" placeholder="0901234567">
            </div>
            <div>
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" max="2026-04-22">
            </div>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" pattern="^[a-zA-Z0-9_]{3,20}$" title="Từ 3-20 ký tự, chỉ dùng chữ cái, số và dấu gạch dưới" placeholder="tendangnhap">
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" minlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$" title="Ít nhất 8 ký tự, gồm 1 chữ hoa và 1 chữ số" placeholder="********">
            </div>
            <div>
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" placeholder="********">
            </div>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <div>
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">-- Chọn thành phố --</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </div>
            <div>
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường, phường/xã..."></textarea>
            </div>
            <div>
                <label>Giới tính:</label>
                <input type="radio" id="male" name="gender" value="male"> <label for="male" style="width:auto">Nam</label>
                <input type="radio" id="female" name="gender" value="female"> <label for="female" style="width:auto">Nữ</label>
                <input type="radio" id="other" name="gender" value="other"> <label for="other" style="width:auto">Khác</label>
            </div>
        </fieldset>

        <div>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="width:auto">Tôi đồng ý với điều khoản dịch vụ</label>
        </div>

        <div>
            <button type="submit">Đăng ký ngay</button>
            <button type="reset">Nhập lại</button>
        </div>

    </form>

</body>
</html>
