<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu Sản phẩm Multimedia</title>
</head>
<body>

    <header>
        <svg width="100" height="50" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="10" width="30" height="30" fill="#3498db" />
            <circle cx="70" cy="25" r="15" fill="#e74c3c" />
            <text x="5" y="45" font-size="10" font-family="Arial">TechStore</text>
        </svg>
        <h1>Trang Giới Thiệu Sản Phẩm Mới</h1>
    </header>

    <main>
        <section>
            <h2>Bộ sưu tập thiết bị</h2>
            
            <figure>
                <img src="iphone.jpg" alt="iPhone 16 Pro màu Titan Sa mạc" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>iPhone 16 Pro - Thiết kế Titan sang trọng</figcaption>
            </figure>

            <figure>
                <img src="macbook.jpg" alt="MacBook Air M3 màn hình 13 inch" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>MacBook Air M3 - Hiệu năng vượt trội</figcaption>
            </figure>

            <figure>
                <img src="airpods.jpg" alt="Tai nghe AirPods Pro 2 với hộp sạc USB-C" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>AirPods Pro 2 - Chống ồn chủ động</figcaption>
            </figure>
        </section>

        <section>
            <h2>Video trải nghiệm sản phẩm</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
        </section>

        <section>
            <h2>Clip quảng cáo (Local)</h2>
            <video controls poster="poster-image.jpg" style="max-width: 100%;">
                <source src="promo.mp4" type="video/mp4">
                <source src="promo.webm" type="video/webm">
                Trình duyệt của bạn không hỗ trợ xem video.
            </video>
        </section>

        <section>
            <h2>Nghe thử nhạc chuông mới</h2>
            <audio controls>
                <source src="background-music.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ phát âm thanh.
            </audio>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Trang giới thiệu sản phẩm của Nhóm 5</p>
    </footer>

</body>
</html>
